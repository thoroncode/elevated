<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title></title>
<style>
  @font-face {
    font-family: "PCVGA";
    src: url("fonts/ibm_vga8.woff2") format("woff2"),
         url("fonts/ibm_vga8.woff") format("woff");
    font-display: block;
  }
  html, body {
    margin: 0; padding: 0;
    background: #050505;
    height: 100%;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    height: 100vh;
    padding-left: calc(5vw + 1px);
    box-sizing: border-box;
    position: relative;
    filter: contrast(1.06) brightness(0.96);
  }
  #stage {
    position: relative;
    width: min(100vw, 100vh * 1.8);
    aspect-ratio: 720 / 400;
    overflow: visible;
    animation: flicker 4.8s infinite steps(1);
    background:
      radial-gradient(ellipse at 50% 48%, rgba(26, 72, 170, 0.11) 0%, rgba(8, 18, 48, 0.05) 26%, rgba(0, 0, 0, 0) 58%),
      radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0) 58%, rgba(0, 0, 0, 0.22) 86%, rgba(0, 0, 0, 0.48) 100%);
    isolation: isolate;
  }
  #screen {
    position: absolute;
    top: 0; left: 0;
    width: 720px;
    height: 400px;
    font-family: "PCVGA", "Courier New", monospace;
    font-size: 16px;
    line-height: 16px;
    letter-spacing: 1px;
    color: #5d6f9a;
    white-space: pre;
    transform-origin: top left;
    filter: blur(0.32px) saturate(1.14);
    -webkit-text-stroke: 0.22px rgba(4, 12, 36, 0.62);
    text-shadow:
      0 0 3px rgba(66, 128, 255, 0.34),
      0 0 6.5px rgba(42, 102, 255, 0.18),
      0 0 12px rgba(24, 80, 220, 0.08);
    user-select: text;
    -webkit-user-select: text;
    z-index: 3;
  }
  #screen .l {
    color: rgb(150, 200, 255);
    -webkit-text-stroke: 0.26px rgba(5, 16, 44, 0.70);
    text-shadow:
      0 0 3.2px rgba(120, 172, 255, 0.62),
      0 0 6.5px rgba(60, 124, 255, 0.32),
      0 0 12px rgba(30, 94, 230, 0.16),
      0 0 22px rgba(18, 70, 200, 0.07);
  }
  #screen .r {
    color: rgb(86, 132, 220);
    text-shadow:
      0 0 0.35px rgba(115, 165, 255, 0.84),
      0 0 0.8px rgba(92, 146, 255, 0.66),
      0 0 1.8px rgba(54, 112, 235, 0.34),
      0 0 3.5px rgba(26, 82, 204, 0.10);
  }
  #screen .s {
    color: rgb(62, 98, 176);
    text-shadow:
      0 0 0.35px rgba(88, 132, 236, 0.52),
      0 0 1.5px rgba(42, 98, 218, 0.20);
  }

  #screenGlow,
  #screenGhost,
  #fx,
  #noise {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  #screenGlow,
  #screenGhost {
    top: 0; left: 0;
    width: 720px;
    height: 400px;
    font-family: "PCVGA", "Courier New", monospace;
    font-size: 16px;
    line-height: 16px;
    letter-spacing: 1px;
    white-space: pre;
  }

  #screenGlow {
    z-index: 1;
    opacity: 0.78;
    transform-origin: top left;
    filter: blur(1.2px) saturate(1.28);
    mix-blend-mode: screen;
  }

  #screenGlow .l {
    color: rgba(88, 150, 255, 0.92);
    text-shadow:
      0 0 3px rgba(92, 152, 255, 0.80),
      0 0 8px rgba(56, 120, 255, 0.54),
      0 0 16px rgba(28, 90, 255, 0.30),
      0 0 26px rgba(18, 70, 220, 0.14);
  }
  #screenGlow .r {
    color: rgba(52, 108, 230, 0.56);
    text-shadow:
      0 0 2px rgba(58, 116, 236, 0.44),
      0 0 8px rgba(28, 88, 220, 0.20);
  }
  #screenGlow .s { color: rgba(22, 58, 140, 0.20); }

  #screenGhost {
    z-index: 2;
    opacity: 0.22;
    transform-origin: top left;
    filter: blur(0.9px);
    mix-blend-mode: screen;
  }

  #screenGhost .l,
  #screenGhost .r,
  #screenGhost .s {
    color: rgba(150, 198, 255, 0.52);
    text-shadow: 0 0 4px rgba(80, 140, 255, 0.30);
  }

  #fx {
    z-index: 4;
    background:
      linear-gradient(to bottom,
        rgba(120, 170, 255, 0.030) 0%,
        rgba(0, 0, 0, 0.000) 18%,
        rgba(0, 0, 0, 0.020) 56%,
        rgba(0, 0, 0, 0.070) 100%),
      repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.015) 0px,
        rgba(255,255,255,0.015) 1px,
        rgba(0,0,0,0.000) 1px,
        rgba(0,0,0,0.000) 2px,
        rgba(0,0,0,0.120) 2px,
        rgba(0,0,0,0.120) 3px,
        rgba(0,0,0,0.030) 3px,
        rgba(0,0,0,0.030) 4px
      ),
      radial-gradient(ellipse at center, rgba(50, 110, 255, 0.08) 0%, rgba(0,0,0,0) 44%),
      radial-gradient(ellipse at center, rgba(0,0,0,0) 54%, rgba(0,0,0,0.20) 78%, rgba(0,0,0,0.52) 100%);
    background-blend-mode: screen, multiply, screen, normal;
    mix-blend-mode: normal;
    opacity: 0.92;
  }

  #noise {
    z-index: 5;
    opacity: 0.028;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.7) 0 0.55px, transparent 0.7px),
      radial-gradient(circle at 73% 62%, rgba(255,255,255,0.55) 0 0.45px, transparent 0.6px),
      radial-gradient(circle at 46% 81%, rgba(255,255,255,0.42) 0 0.4px, transparent 0.55px),
      radial-gradient(circle at 12% 76%, rgba(255,255,255,0.30) 0 0.5px, transparent 0.7px);
    background-size: 7px 7px, 9px 9px, 11px 11px, 13px 13px;
    mix-blend-mode: screen;
    animation: noiseDrift 0.24s infinite steps(2);
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 2;
    background:
      radial-gradient(ellipse at center, rgba(0, 0, 0, 0) 42%, rgba(0, 0, 0, 0.22) 72%, rgba(0, 0, 0, 0.68) 100%),
      linear-gradient(to right, rgba(0,0,0,0.18), rgba(0,0,0,0.05) 12%, rgba(0,0,0,0.02) 50%, rgba(0,0,0,0.06) 88%, rgba(0,0,0,0.22));
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 3;
    background: linear-gradient(to bottom, rgba(0,0,0,0.18), rgba(0,0,0,0.03) 20%, rgba(0,0,0,0.10) 100%);
  }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    8% { opacity: 0.992; }
    9% { opacity: 0.998; }
    27% { opacity: 0.989; }
    28% { opacity: 0.997; }
    53% { opacity: 0.994; }
    54% { opacity: 0.988; }
    55% { opacity: 0.997; }
    78% { opacity: 0.991; }
    79% { opacity: 0.998; }
  }
  @keyframes noiseDrift {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(-0.4px, 0.2px); }
    50%  { transform: translate(0.3px, -0.3px); }
    75%  { transform: translate(-0.2px, 0.4px); }
    100% { transform: translate(0, 0); }
  }
</style>
</head>
<body>
<div id="stage">
  <div id="screenGlow"></div>
  <div id="screenGhost"></div>
  <div id="screen"></div>
  <div id="fx"></div>
  <div id="noise"></div>
</div>
<script>
(function () {
  const screen = document.getElementById("screen");
  const screenGlow = document.getElementById("screenGlow");
  const screenGhost = document.getElementById("screenGhost");
  const stage = document.getElementById("stage");

  const COLS = 80;
  const ROWS = 25;

  const GLYPHS = "!@#$%^*()_+-=[]{}|\\;:,.?/~`0123456789" +
                 "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
  const FLIP_MS = 40;
  const SCRAMBLE_MS = 2000;
  const REVEAL_SPAN_MS = 6000;

  const MENU = [
    "DATANET PROC RECORD:  45-3456-W-3452                         Transnet on/xc-3",
    "",
    "                         FEDERAL RESERVE TRANSFER MODE",
    "",
    "                             National Headquarters",
    "",
    "      ************  Remote Systems Network Input Station  ************",
    "      ================================================================",
    "",
    "         [1] Interbank Funds Transfer  (Code Prog: 485-GWU)",
    "         [2] International Telelink Access  (Code Lim: XRP-262)",
    "         [3] Remote Facsimile Send/Receive  (Code Tran:  2LZP-517)",
    "         [4] Regional Bank Interconnect  (Security Code:  47-B34)",
    "         [5] Elevate System Simulation  (Code Sim:  RGB-A4K)",
    "         [6] Update System Parameters  (Entry Auth. Req.)",
    "         [7] Remote Operator Logon/Logoff",
    "",
    "      ================================================================",
    "",
    "                       [ ] Select Option or ESC to Abort",
  ];

  const ABC123_URL = "https://thoron.iki.fi/hush-hush-secret/abc123.sh";
  const ABC123_HREF = "abc123.sh.zip";

  const rowNodes = [];
  const glowRowNodes = [];
  const ghostRowNodes = [];
  for (let r = 0; r < ROWS; r++) {
    const d = document.createElement("div");
    screen.appendChild(d);
    rowNodes.push(d);

    const g = document.createElement("div");
    screenGlow.appendChild(g);
    glowRowNodes.push(g);

    const gh = document.createElement("div");
    screenGhost.appendChild(gh);
    ghostRowNodes.push(gh);
  }

  function updateScale() {
    const sw = stage.clientWidth;
    const sh = stage.clientHeight;
    const s = Math.min(sw / 720, sh / 400);
    const transform = "scale(" + s + ")";
    screen.style.transform = transform;
    screenGlow.style.transform = transform;
    screenGhost.style.transform = "translate(0.45px, 0) " + transform;
  }
  window.addEventListener("resize", updateScale);
  updateScale();
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(updateScale);
  }

  function esc(s) {
    return s.replace(/[&<>]/g, (ch) => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[ch]));
  }

  function buildTarget(lines) {
    const rowTop = Math.max(0, Math.floor((ROWS - lines.length) / 2));
    const target = new Array(ROWS);
    for (let r = 0; r < ROWS; r++) {
      let row = "";
      const mr = r - rowTop;
      if (mr >= 0 && mr < lines.length) row = lines[mr];
      if (row.length < COLS) row = row + " ".repeat(COLS - row.length);
      else row = row.slice(0, COLS);
      target[r] = row;
    }
    return target;
  }

  function randGlyph() {
    return GLYPHS[(Math.random() * GLYPHS.length) | 0];
  }

  function rowHTML(cells, r) {
    let out = "";
    let currentCls = null;
    let run = "";
    for (let c = 0; c < COLS; c++) {
      const cell = cells[r * COLS + c];
      const cls = cell.locked ? cell.color : "s";
      if (cls !== currentCls) {
        if (run) out += '<span class="' + currentCls + '">' + esc(run) + '</span>';
        currentCls = cls;
        run = cell.current;
      } else {
        run += cell.current;
      }
    }
    if (run) out += '<span class="' + currentCls + '">' + esc(run) + '</span>';
    return out || "\u00a0";
  }

  function renderCells(cells) {
    for (let r = 0; r < ROWS; r++) {
      const html = rowHTML(cells, r);
      rowNodes[r].innerHTML = html;
      glowRowNodes[r].innerHTML = html;
      ghostRowNodes[r].innerHTML = html;
    }
  }

  let raf = 0;
  let keyHandler = null;
  let menuShownOnce = false;

  function clearHandlers() {
    if (keyHandler) { window.removeEventListener("keydown", keyHandler); keyHandler = null; }
  }

  function decrypt(lines, colorFn, scrambleFn) {
    return new Promise((resolve) => {
      const target = buildTarget(lines);
      const cells = new Array(ROWS * COLS);
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const ch = target[r][c];
          const isSpace = ch === " ";
          const scramble = scrambleFn ? scrambleFn(r, c, ch) : !isSpace;
          cells[r * COLS + c] = {
            target: ch,
            current: scramble ? randGlyph() : ch,
            unlockAt: SCRAMBLE_MS + Math.random() * REVEAL_SPAN_MS,
            locked: !scramble,
            color: colorFn(r, c),
          };
        }
      }

      let start = 0;
      let lastFlip = 0;
      let dirty = true;

      function frame(now) {
        if (!start) start = now;
        const t = now - start;
        const flip = (now - lastFlip) >= FLIP_MS;
        if (flip) lastFlip = now;

        let done = true;
        for (let i = 0; i < cells.length; i++) {
          const cell = cells[i];
          if (cell.locked) continue;
          if (t >= cell.unlockAt) {
            cell.current = cell.target;
            cell.locked = true;
            dirty = true;
          } else {
            done = false;
            if (flip) {
              cell.current = randGlyph();
              dirty = true;
            }
          }
        }

        if (dirty) { renderCells(cells); dirty = false; }

        if (!done) raf = requestAnimationFrame(frame);
        else { raf = 0; resolve(cells); }
      }
      raf = requestAnimationFrame(frame);
    });
  }

  function renderDirect(lines, colorFn) {
    const target = buildTarget(lines);
    const cells = new Array(ROWS * COLS);
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const ch = target[r][c];
        cells[r * COLS + c] = {
          target: ch,
          current: ch,
          unlockAt: 0,
          locked: true,
          color: colorFn(r, c),
        };
      }
    }
    renderCells(cells);
    return cells;
  }

  function byteToGlyph(b) {
    if (b === 0x20) return " ";
    if (b >= 0x21 && b <= 0x7E) return String.fromCharCode(b);
    return GLYPHS[b % GLYPHS.length];
  }

  async function fetchBytes() {
    try {
      const resp = await fetch("abc123.sh", { cache: "no-store" });
      return new Uint8Array(await resp.arrayBuffer());
    } catch (e) {
      const n = (ROWS - 1) * COLS;
      const buf = new Uint8Array(n);
      for (let i = 0; i < n; i++) buf[i] = 32 + ((Math.random() * 95) | 0);
      return buf;
    }
  }

  async function showMenu() {
    clearHandlers();
    if (raf) cancelAnimationFrame(raf);
    if (menuShownOnce) {
      renderDirect(MENU, () => "l");
    } else {
      await decrypt(MENU, () => "l");
      menuShownOnce = true;
    }
    keyHandler = (e) => {
      if (e.key === "5") { e.preventDefault(); showRaw(); }
    };
    window.addEventListener("keydown", keyHandler);
  }

  async function showRaw() {
    clearHandlers();
    if (raf) cancelAnimationFrame(raf);
    const buf = await fetchBytes();

    const topBar = "DATANET PROC RECORD:  45-3456-W-3452                         Transnet rgba/tbc";
    const title = "                         FEDERAL RESERVE TRANSFER MODE";
    const subtitle = "                                    Elevated";
    const starsLine = "      " + "*".repeat(25) + "  Data Dump  " + "*".repeat(26);
    const eq = "      " + "=".repeat(64);
    const download = "         [1] Download";
    const select = "                       [ ] Select Option or ESC to Abort";

    const ROW_COLS = 64;
    const DATA_ROWS = 5;
    const lines = [topBar, "", title, "", subtitle, "", starsLine, eq, ""];
    const dataStart = lines.length;
    for (let r = 0; r < DATA_ROWS; r++) {
      let line = "      ";
      for (let c = 0; c < ROW_COLS; c++) {
        const idx = r * ROW_COLS + c;
        line += idx < buf.length ? byteToGlyph(buf[idx]) : " ";
      }
      lines.push(line);
    }
    const dataEnd = lines.length - 1;
    lines.push("");
    lines.push(download);
    lines.push("");
    lines.push(eq);
    lines.push("");
    lines.push(select);

    const rowTop = Math.max(0, Math.floor((ROWS - lines.length) / 2));
    const canvasDataStart = rowTop + dataStart;
    const canvasDataEnd = rowTop + dataEnd;
    renderDirect(lines, (r) => (r >= canvasDataStart && r <= canvasDataEnd ? "r" : "l"));

    keyHandler = (e) => {
      if (e.key === "1") { e.preventDefault(); showURL(); }
      else if (e.key === "Escape" || e.key === "Backspace") { e.preventDefault(); showMenu(); }
    };
    window.addEventListener("keydown", keyHandler);
  }

  async function showURL() {
    clearHandlers();
    if (raf) cancelAnimationFrame(raf);

    const topBar = "DATANET PROC RECORD:  45-3456-W-3452                         Transnet rgba/tbc";
    const title = "                         FEDERAL RESERVE TRANSFER MODE";
    const subtitle = "                                    Elevated";
    const starsLine = "      " + "*".repeat(25) + "  Data Dump  " + "*".repeat(26);
    const eq = "      " + "=".repeat(64);
    const download = "         [1] Download";
    const select = "                       [ ] Select Option or ESC to Abort";

    const ROW_COLS = 64;
    const DATA_ROWS = 5;
    const urlPad = Math.max(0, Math.floor((ROW_COLS - ABC123_URL.length) / 2));
    const urlLine = "      " + " ".repeat(urlPad) + ABC123_URL;

    const lines = [topBar, "", title, "", subtitle, "", starsLine, eq, ""];
    const dataStart = lines.length;
    for (let r = 0; r < DATA_ROWS; r++) {
      lines.push(r === 2 ? urlLine : "");
    }
    lines.push("");
    lines.push(download);
    lines.push("");
    lines.push(eq);
    lines.push("");
    lines.push(select);

    const rowTop = Math.max(0, Math.floor((ROWS - lines.length) / 2));
    const urlRow = rowTop + dataStart + 2;
    await decrypt(lines, () => "l", (r, c, ch) => r === urlRow && ch !== " ");

    const urlNode = rowNodes[urlRow];
    urlNode.innerHTML = '<a href="' + ABC123_HREF + '" download style="color:inherit;text-decoration:none;">' + urlNode.innerHTML + '</a>';

    keyHandler = (e) => {
      if (e.key === "Escape" || e.key === "Backspace") { e.preventDefault(); showRaw(); }
    };
    window.addEventListener("keydown", keyHandler);
  }

  showMenu();
})();
</script>
</body>
</html>
