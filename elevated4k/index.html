<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title></title>
<style>
  @font-face {
    font-family: "PCVGA";
    src: url("fonts/ibm_vga8.woff2") format("woff2"),
         url("fonts/ibm_vga8.woff") format("woff");
    font-display: block;
  }
  html, body {
    margin: 0; padding: 0;
    background: #050505;
    height: 100%;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    height: 100vh;
    padding-left: calc(5vw + 1px);
    box-sizing: border-box;
    position: relative;
    filter: contrast(1.06) brightness(0.96);
  }
  #stage {
    position: relative;
    width: min(100vw, 100vh * 1.8);
    aspect-ratio: 720 / 400;
    overflow: visible;
    animation: flicker 4.8s infinite steps(1);
    background:
      radial-gradient(ellipse at 50% 48%, rgba(26, 72, 170, 0.11) 0%, rgba(8, 18, 48, 0.05) 26%, rgba(0, 0, 0, 0) 58%),
      radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0) 58%, rgba(0, 0, 0, 0.22) 86%, rgba(0, 0, 0, 0.48) 100%);
    isolation: isolate;
  }
  #screen {
    position: absolute;
    top: 0; left: 0;
    width: 720px;
    height: 400px;
    font-family: "PCVGA", "Courier New", monospace;
    font-size: 16px;
    line-height: 16px;
    letter-spacing: 1px;
    color: #5d6f9a;
    white-space: pre;
    transform-origin: top left;
    filter: blur(0.32px) saturate(1.14);
    -webkit-text-stroke: 0.22px rgba(4, 12, 36, 0.62);
    text-shadow:
      0 0 3px rgba(66, 128, 255, 0.34),
      0 0 6.5px rgba(42, 102, 255, 0.18),
      0 0 12px rgba(24, 80, 220, 0.08);
    user-select: text;
    -webkit-user-select: text;
    z-index: 3;
  }
  #screen .l {
    color: rgb(150, 200, 255);
    -webkit-text-stroke: 0.26px rgba(5, 16, 44, 0.70);
    text-shadow:
      0 0 3.2px rgba(120, 172, 255, 0.62),
      0 0 6.5px rgba(60, 124, 255, 0.32),
      0 0 12px rgba(30, 94, 230, 0.16),
      0 0 22px rgba(18, 70, 200, 0.07);
  }
  #screen .r {
    color: rgb(86, 132, 220);
    text-shadow:
      0 0 0.35px rgba(115, 165, 255, 0.84),
      0 0 0.8px rgba(92, 146, 255, 0.66),
      0 0 1.8px rgba(54, 112, 235, 0.34),
      0 0 3.5px rgba(26, 82, 204, 0.10);
  }
  #screen .s {
    color: rgb(62, 98, 176);
    text-shadow:
      0 0 0.35px rgba(88, 132, 236, 0.52),
      0 0 1.5px rgba(42, 98, 218, 0.20);
  }

  #screenGlow,
  #screenGhost,
  #fx,
  #noise {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  #screenGlow,
  #screenGhost {
    top: 0; left: 0;
    width: 720px;
    height: 400px;
    font-family: "PCVGA", "Courier New", monospace;
    font-size: 16px;
    line-height: 16px;
    letter-spacing: 1px;
    white-space: pre;
  }

  #screenGlow {
    z-index: 1;
    opacity: 0.78;
    transform-origin: top left;
    filter: blur(1.2px) saturate(1.28);
    mix-blend-mode: screen;
  }

  #screenGlow .l {
    color: rgba(88, 150, 255, 0.92);
    text-shadow:
      0 0 3px rgba(92, 152, 255, 0.80),
      0 0 8px rgba(56, 120, 255, 0.54),
      0 0 16px rgba(28, 90, 255, 0.30),
      0 0 26px rgba(18, 70, 220, 0.14);
  }
  #screenGlow .r {
    color: rgba(52, 108, 230, 0.56);
    text-shadow:
      0 0 2px rgba(58, 116, 236, 0.44),
      0 0 8px rgba(28, 88, 220, 0.20);
  }
  #screenGlow .s { color: rgba(22, 58, 140, 0.20); }

  #screenGhost {
    z-index: 2;
    opacity: 0.22;
    transform-origin: top left;
    filter: blur(0.9px);
    mix-blend-mode: screen;
  }

  #screenGhost .l,
  #screenGhost .r,
  #screenGhost .s {
    color: rgba(150, 198, 255, 0.52);
    text-shadow: 0 0 4px rgba(80, 140, 255, 0.30);
  }

  #fx {
    z-index: 4;
    background:
      linear-gradient(to bottom,
        rgba(120, 170, 255, 0.030) 0%,
        rgba(0, 0, 0, 0.000) 18%,
        rgba(0, 0, 0, 0.020) 56%,
        rgba(0, 0, 0, 0.070) 100%),
      repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.015) 0px,
        rgba(255,255,255,0.015) 1px,
        rgba(0,0,0,0.000) 1px,
        rgba(0,0,0,0.000) 2px,
        rgba(0,0,0,0.120) 2px,
        rgba(0,0,0,0.120) 3px,
        rgba(0,0,0,0.030) 3px,
        rgba(0,0,0,0.030) 4px
      ),
      radial-gradient(ellipse at center, rgba(50, 110, 255, 0.08) 0%, rgba(0,0,0,0) 44%),
      radial-gradient(ellipse at center, rgba(0,0,0,0) 54%, rgba(0,0,0,0.20) 78%, rgba(0,0,0,0.52) 100%);
    background-blend-mode: screen, multiply, screen, normal;
    mix-blend-mode: normal;
    opacity: 0.92;
  }

  #noise {
    z-index: 5;
    opacity: 0.028;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.7) 0 0.55px, transparent 0.7px),
      radial-gradient(circle at 73% 62%, rgba(255,255,255,0.55) 0 0.45px, transparent 0.6px),
      radial-gradient(circle at 46% 81%, rgba(255,255,255,0.42) 0 0.4px, transparent 0.55px),
      radial-gradient(circle at 12% 76%, rgba(255,255,255,0.30) 0 0.5px, transparent 0.7px);
    background-size: 7px 7px, 9px 9px, 11px 11px, 13px 13px;
    mix-blend-mode: screen;
    animation: noiseDrift 0.24s infinite steps(2);
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 2;
    background:
      radial-gradient(ellipse at center, rgba(0, 0, 0, 0) 42%, rgba(0, 0, 0, 0.22) 72%, rgba(0, 0, 0, 0.68) 100%),
      linear-gradient(to right, rgba(0,0,0,0.18), rgba(0,0,0,0.05) 12%, rgba(0,0,0,0.02) 50%, rgba(0,0,0,0.06) 88%, rgba(0,0,0,0.22));
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 3;
    background: linear-gradient(to bottom, rgba(0,0,0,0.18), rgba(0,0,0,0.03) 20%, rgba(0,0,0,0.10) 100%);
  }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    8% { opacity: 0.992; }
    9% { opacity: 0.998; }
    27% { opacity: 0.989; }
    28% { opacity: 0.997; }
    53% { opacity: 0.994; }
    54% { opacity: 0.988; }
    55% { opacity: 0.997; }
    78% { opacity: 0.991; }
    79% { opacity: 0.998; }
  }
  @keyframes noiseDrift {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(-0.4px, 0.2px); }
    50%  { transform: translate(0.3px, -0.3px); }
    75%  { transform: translate(-0.2px, 0.4px); }
    100% { transform: translate(0, 0); }
  }
  body.stable #stage,
  body.stable #noise { animation: none !important; }
</style>
<style id="lab-overrides"></style>
</head>
<body>
<div id="stage">
  <div id="screenGlow"></div>
  <div id="screenGhost"></div>
  <div id="screen"></div>
  <div id="fx"></div>
  <div id="noise"></div>
</div>
<script>
(function () {
  const screen = document.getElementById("screen");
  const screenGlow = document.getElementById("screenGlow");
  const screenGhost = document.getElementById("screenGhost");
  const stage = document.getElementById("stage");

  const COLS = 80;
  const ROWS = 25;

  // IBM code page 437 subset, as used in the Sneakers film's DATANET scramble.
  // Weighted toward box-drawing, shading blocks, Greek and math so the look matches
  // the original phosphor noise rather than plain ASCII.
  const GLYPHS =
    "0123456789" +
    "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz" +
    "!#$%&*+-=?@^_" +
    "\u00c7\u00fc\u00e9\u00e2\u00e4\u00e0\u00e5\u00e7\u00ea\u00eb\u00e8\u00ef\u00ee\u00ec\u00c4\u00c5" +
    "\u00c9\u00e6\u00c6\u00f4\u00f6\u00f2\u00fb\u00f9\u00ff\u00d6\u00dc\u00a2\u00a3\u00a5\u20a7\u0192" +
    "\u00e1\u00ed\u00f3\u00fa\u00f1\u00d1\u00aa\u00ba\u00bf\u2310\u00ac\u00bd\u00bc\u00a1\u00ab\u00bb" +
    "\u2591\u2592\u2593\u2502\u2524\u2561\u2562\u2556\u2555\u2563\u2551\u2557\u255d\u255c\u255b\u2510" +
    "\u2514\u2534\u252c\u251c\u2500\u253c\u255e\u255f\u255a\u2554\u2569\u2566\u2560\u2550\u256c\u2567" +
    "\u2568\u2564\u2565\u2559\u2558\u2552\u2553\u256b\u256a\u2518\u250c\u2588\u2584\u258c\u2590\u2580" +
    "\u03b1\u00df\u0393\u03c0\u03a3\u03c3\u00b5\u03c4\u03a6\u0398\u03a9\u03b4\u221e\u03c6\u03b5\u2229" +
    "\u2261\u00b1\u2265\u2264\u2320\u2321\u00f7\u2248\u00b0\u2219\u00b7\u221a\u207f\u00b2\u25a0";
  const FLIP_MS = 40;
  const SCRAMBLE_MS = 2000;
  const REVEAL_SPAN_MS = 6000;

  const MENU_MODERN = [
    "DATANET PROC RECORD:  45-3456-W-3452                         Transnet on/xc-3",
    "",
    "                         FEDERAL RESERVE TRANSFER MODE",
    "",
    "                             National Headquarters",
    "",
    "      ************  Remote Systems Network Input Station  ************",
    "      ================================================================",
    "",
    "         [1] Interbank Funds Transfer  (Code Prog: 485-GWU)",
    "         [2] International Telelink Access  (Code Lim: XRP-262)",
    "         [3] Remote Facsimile Send/Receive  (Code Tran:  2LZP-517)",
    "         [4] Regional Bank Interconnect  (Security Code:  47-B34)",
    "         [5] Elevated System Simulation  (Code Sim: RGB-A4K)",
    "         [6] Update System Parameters  (Entry Auth. Req.)",
    "         [7] Remote Operator Logon/Logoff",
    "",
    "      ================================================================",
    "",
    "                       [ ] Select Option or ESC to Abort",
  ];

  const MENU_ORIGINAL = [
    "DATANET PROC RECORD:  45-3456-W-3452                         Transnet on/xc-3",
    "",
    "                         FEDERAL RESERVE TRANSFER MODE",
    "",
    "                             National Headquarters",
    "",
    "      ************  Remote Systems Network Input Station  ************",
    "      ================================================================",
    "",
    "         [1] Interbank Funds Transfer  (Code Prog: 485-GWU)",
    "         [2] International Telelink Access  (Code Lim: XRP-262)",
    "         [3] Remote Facsimile Send/Receive  (Code Tran:  2LZP-517)",
    "         [4] Regional Bank Interconnect  (Security Code:  47-B34)",
    "         [5] Update System Parameters  (Entry Auth. Req.)",
    "         [6] Remote Operator Logon/Logoff",
    "",
    "      ================================================================",
    "",
    "                       [ ] Select Option or ESC to Abort",
  ];

  const urlParams = new URLSearchParams(location.search);
  const testVariant = urlParams.get("test");
  const stableMode = testVariant === "original" || testVariant === "stable";
  const MENU = testVariant === "original" ? MENU_ORIGINAL : MENU_MODERN;
  if (stableMode) document.body.classList.add("stable");

  const ABC123_URL = "https://thoron.iki.fi/hush-hush-secret/abc123.sh";
  const ABC123_HREF = "abc123.sh.zip";

  const rowNodes = [];
  const glowRowNodes = [];
  const ghostRowNodes = [];
  for (let r = 0; r < ROWS; r++) {
    const d = document.createElement("div");
    screen.appendChild(d);
    rowNodes.push(d);

    const g = document.createElement("div");
    screenGlow.appendChild(g);
    glowRowNodes.push(g);

    const gh = document.createElement("div");
    screenGhost.appendChild(gh);
    ghostRowNodes.push(gh);
  }

  function updateScale() {
    const sw = stage.clientWidth;
    const sh = stage.clientHeight;
    const s = Math.min(sw / 720, sh / 400);
    const transform = "scale(" + s + ")";
    screen.style.transform = transform;
    screenGlow.style.transform = transform;
    screenGhost.style.transform = "translate(0.45px, 0) " + transform;
  }
  window.addEventListener("resize", updateScale);
  updateScale();
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(updateScale);
  }

  const ESC_MAP = {"&":"&amp;","<":"&lt;",">":"&gt;"};
  function esc(s) {
    if (s.indexOf("&") < 0 && s.indexOf("<") < 0 && s.indexOf(">") < 0) return s;
    return s.replace(/[&<>]/g, (ch) => ESC_MAP[ch]);
  }

  function buildTarget(lines) {
    const rowTop = Math.max(0, Math.floor((ROWS - lines.length) / 2));
    const target = new Array(ROWS);
    for (let r = 0; r < ROWS; r++) {
      let row = "";
      const mr = r - rowTop;
      if (mr >= 0 && mr < lines.length) row = lines[mr];
      if (row.length < COLS) row = row + " ".repeat(COLS - row.length);
      else row = row.slice(0, COLS);
      target[r] = row;
    }
    return target;
  }

  function randGlyph() {
    return GLYPHS[(Math.random() * GLYPHS.length) | 0];
  }

  function rowHTML(cells, r) {
    let out = "";
    let currentCls = null;
    let run = "";
    const base = r * COLS;
    for (let c = 0; c < COLS; c++) {
      const cell = cells[base + c];
      const cls = cell.locked ? cell.color : "s";
      if (cls !== currentCls) {
        if (run) out += '<span class="' + currentCls + '">' + esc(run) + '</span>';
        currentCls = cls;
        run = cell.current;
      } else {
        run += cell.current;
      }
    }
    if (run) out += '<span class="' + currentCls + '">' + esc(run) + '</span>';
    return out || "\u00a0";
  }

  const rowDirty = new Uint8Array(ROWS);
  const lastRowHTML = new Array(ROWS).fill(null);

  function markAllRowsDirty() {
    for (let r = 0; r < ROWS; r++) rowDirty[r] = 1;
  }

  function renderCells(cells) {
    for (let r = 0; r < ROWS; r++) {
      if (rowDirty[r] === 0) continue;
      rowDirty[r] = 0;
      const html = rowHTML(cells, r);
      if (html === lastRowHTML[r]) continue;
      lastRowHTML[r] = html;
      rowNodes[r].innerHTML = html;
      glowRowNodes[r].innerHTML = html;
      ghostRowNodes[r].innerHTML = html;
    }
  }

  let raf = 0;
  let keyHandler = null;
  let menuShownOnce = false;

  function clearHandlers() {
    if (keyHandler) { window.removeEventListener("keydown", keyHandler); keyHandler = null; }
  }

  function decrypt(lines, colorFn, scrambleFn) {
    return new Promise((resolve) => {
      const target = buildTarget(lines);
      const cells = new Array(ROWS * COLS);
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const ch = target[r][c];
          const isSpace = ch === " ";
          const scramble = scrambleFn ? scrambleFn(r, c, ch) : !isSpace;
          cells[r * COLS + c] = {
            target: ch,
            current: scramble ? randGlyph() : ch,
            unlockAt: SCRAMBLE_MS + Math.random() * REVEAL_SPAN_MS,
            locked: !scramble,
            color: colorFn(r, c),
          };
        }
      }

      markAllRowsDirty();

      let start = 0;
      let lastFlip = 0;

      function frame(now) {
        if (!start) start = now;
        const t = now - start;
        const flip = (now - lastFlip) >= FLIP_MS;
        if (flip) lastFlip = now;

        let done = true;
        for (let i = 0; i < cells.length; i++) {
          const cell = cells[i];
          if (cell.locked) continue;
          if (t >= cell.unlockAt) {
            cell.current = cell.target;
            cell.locked = true;
            rowDirty[(i / COLS) | 0] = 1;
          } else {
            done = false;
            if (flip) {
              cell.current = randGlyph();
              rowDirty[(i / COLS) | 0] = 1;
            }
          }
        }

        renderCells(cells);

        if (!done) raf = requestAnimationFrame(frame);
        else { raf = 0; resolve(cells); }
      }
      raf = requestAnimationFrame(frame);
    });
  }

  function renderDirect(lines, colorFn) {
    const target = buildTarget(lines);
    const cells = new Array(ROWS * COLS);
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const ch = target[r][c];
        cells[r * COLS + c] = {
          target: ch,
          current: ch,
          unlockAt: 0,
          locked: true,
          color: colorFn(r, c),
        };
      }
    }
    markAllRowsDirty();
    renderCells(cells);
    return cells;
  }

  function byteToGlyph(b) {
    if (b === 0x20) return " ";
    if (b >= 0x21 && b <= 0x7E) return String.fromCharCode(b);
    return GLYPHS[b % GLYPHS.length];
  }

  async function fetchBytes() {
    try {
      const resp = await fetch("abc123.sh", { cache: "no-store" });
      return new Uint8Array(await resp.arrayBuffer());
    } catch (e) {
      const n = (ROWS - 1) * COLS;
      const buf = new Uint8Array(n);
      for (let i = 0; i < n; i++) buf[i] = 32 + ((Math.random() * 95) | 0);
      return buf;
    }
  }

  async function showMenu() {
    clearHandlers();
    if (raf) cancelAnimationFrame(raf);
    if (menuShownOnce || stableMode) {
      renderDirect(MENU, () => "l");
      menuShownOnce = true;
    } else {
      await decrypt(MENU, () => "l");
      menuShownOnce = true;
    }
    keyHandler = (e) => {
      if (e.key === "1") { e.preventDefault(); showFundsTransfer(); }
      else if (e.key === "2") { e.preventDefault(); showTelelink(); }
      else if (e.key === "3") { e.preventDefault(); showFax(); }
      else if (e.key === "4") { e.preventDefault(); showInterconnect(); }
      else if (e.key === "5") { e.preventDefault(); showRaw(); }
      else if (e.key === "6") { e.preventDefault(); showSystemParams(); }
      else if (e.key === "7") { e.preventDefault(); showOperators(); }
    };
    window.addEventListener("keydown", keyHandler);
  }

  async function showFax() {
    clearHandlers();
    if (raf) cancelAnimationFrame(raf);

    const topBar = "DATANET PROC RECORD:  45-3456-W-3452                         Transnet on/xc-3";
    const title = " ".repeat(25) + "REMOTE FACSIMILE SEND/RECEIVE";
    const subtitle = " ".repeat(29) + "National Headquarters";
    const starsLine = "      " + "*".repeat(22) + "  Facsimile Queue  " + "*".repeat(23);
    const eq = "      " + "=".repeat(64);

    const faxRow = (jobId, dest, pages, dir, status) =>
      " ".repeat(13) + jobId.padEnd(8) + "  " + dest.padEnd(16) + "  " +
      pages.padStart(5) + "   " + dir.padEnd(4) + "   " + status;
    const header = faxRow("JOB ID", "DESTINATION", "PAGES", "DIR", "STATUS");
    const rows = [
      faxRow("2LZP-517", "BANK OF ENGLAND", "14", "SEND", "COMPLETE"),
      faxRow("2LZP-518", "CREDIT SUISSE",   "7",  "SEND", "SENDING"),
      faxRow("2LZP-519", "BIS BASEL",       "22", "RECV", "COMPLETE"),
      faxRow("2LZP-520", "BUNDESBANK",      "4",  "SEND", "QUEUED"),
      faxRow("2LZP-521", "MAS SINGAPORE",   "9",  "RECV", "FAILED"),
    ];
    const select = "                       [ ] Select Option or ESC to Abort";

    const lines = [topBar, "", title, "", subtitle, "", starsLine, eq, "", header, ""];
    for (const r of rows) lines.push(r);
    lines.push("");
    lines.push(eq);
    lines.push("");
    lines.push(select);

    renderDirect(lines, () => "l");

    keyHandler = (e) => {
      if (e.key === "Escape" || e.key === "Backspace") { e.preventDefault(); showMenu(); }
    };
    window.addEventListener("keydown", keyHandler);
  }

  async function showTelelink() {
    clearHandlers();
    if (raf) cancelAnimationFrame(raf);

    const topBar = "DATANET PROC RECORD:  45-3456-W-3452                         Transnet on/xc-3";
    const title = " ".repeat(26) + "INTERNATIONAL TELELINK ACCESS";
    const subtitle = " ".repeat(29) + "National Headquarters";
    const starsLine = "      " + "*".repeat(22) + "  Available Links  " + "*".repeat(23);
    const eq = "      " + "=".repeat(64);

    const linkRow = (dest, country, link, status) =>
      " ".repeat(14) + dest.padEnd(16) + "   " + country.padEnd(6) + "   " +
      link.padEnd(7) + "   " + status;
    const header = linkRow("DESTINATION", "COUNTRY", "LINK ID", "STATUS");
    const rows = [
      linkRow("LONDON",    "UK-044", "XRP-262", "ONLINE"),
      linkRow("ZURICH",    "CH-041", "XRP-441", "ONLINE"),
      linkRow("TOKYO",     "JP-081", "XRP-813", "BUSY"),
      linkRow("FRANKFURT", "DE-049", "XRP-069", "OFFLINE"),
      linkRow("SINGAPORE", "SG-065", "XRP-065", "ONLINE"),
    ];
    const select = "                       [ ] Select Option or ESC to Abort";

    const lines = [topBar, "", title, "", subtitle, "", starsLine, eq, "", header, ""];
    for (const r of rows) lines.push(r);
    lines.push("");
    lines.push(eq);
    lines.push("");
    lines.push(select);

    renderDirect(lines, () => "l");

    keyHandler = (e) => {
      if (e.key === "Escape" || e.key === "Backspace") { e.preventDefault(); showMenu(); }
    };
    window.addEventListener("keydown", keyHandler);
  }

  async function showInterconnect() {
    clearHandlers();
    if (raf) cancelAnimationFrame(raf);

  async function showRaw() {
    clearHandlers();
    if (raf) cancelAnimationFrame(raf);
    const buf = await fetchBytes();

    const topBar = "DATANET PROC RECORD:  45-3456-W-3452                         Transnet rgba/tbc";
    const title = " ".repeat(27) + "ELEVATED SYSTEM SIMULATION";
    const subtitle = " ".repeat(29) + "National Headquarters";
    const starsLine = "      " + "*".repeat(25) + "  Data Dump  " + "*".repeat(26);
    const eq = "      " + "=".repeat(64);
    const download = "         [1] Download";
    const select = "                       [ ] Select Option or ESC to Abort";

    const ROW_COLS = 64;
    const DATA_ROWS = 5;
    const lines = [topBar, "", title, "", subtitle, "", starsLine, eq, ""];
    const dataStart = lines.length;
    for (let r = 0; r < DATA_ROWS; r++) {
      let line = "      ";
      for (let c = 0; c < ROW_COLS; c++) {
        const idx = r * ROW_COLS + c;
        line += idx < buf.length ? byteToGlyph(buf[idx]) : " ";
      }
      lines.push(line);
    }
    const dataEnd = lines.length - 1;
    lines.push("");
    lines.push(download);
    lines.push("");
    lines.push(eq);
    lines.push("");
    lines.push(select);

    const rowTop = Math.max(0, Math.floor((ROWS - lines.length) / 2));
    const canvasDataStart = rowTop + dataStart;
    const canvasDataEnd = rowTop + dataEnd;
    renderDirect(lines, (r) => (r >= canvasDataStart && r <= canvasDataEnd ? "r" : "l"));

    keyHandler = (e) => {
      if (e.key === "1") { e.preventDefault(); showURL(); }
      else if (e.key === "Escape" || e.key === "Backspace") { e.preventDefault(); showMenu(); }
    };
    window.addEventListener("keydown", keyHandler);
  }

  async function showURL() {
    clearHandlers();
    if (raf) cancelAnimationFrame(raf);

    const topBar = "DATANET PROC RECORD:  45-3456-W-3452                         Transnet rgba/tbc";
    const title = " ".repeat(27) + "ELEVATED SYSTEM SIMULATION";
    const subtitle = " ".repeat(29) + "National Headquarters";
    const starsLine = "      " + "*".repeat(25) + "  Data Dump  " + "*".repeat(26);
    const eq = "      " + "=".repeat(64);
    const download = "         [1] Download";
    const select = "                       [ ] Select Option or ESC to Abort";

    const ROW_COLS = 64;
    const DATA_ROWS = 5;
    const urlPad = Math.max(0, Math.floor((ROW_COLS - ABC123_URL.length) / 2));
    const urlLine = "      " + " ".repeat(urlPad) + ABC123_URL;

    const lines = [topBar, "", title, "", subtitle, "", starsLine, eq, ""];
    const dataStart = lines.length;
    for (let r = 0; r < DATA_ROWS; r++) {
      lines.push(r === 2 ? urlLine : "");
    }
    lines.push("");
    lines.push(download);
    lines.push("");
    lines.push(eq);
    lines.push("");
    lines.push(select);

    const rowTop = Math.max(0, Math.floor((ROWS - lines.length) / 2));
    const urlRow = rowTop + dataStart + 2;
    await decrypt(lines, () => "l", (r, c, ch) => r === urlRow && ch !== " ");

    const urlNode = rowNodes[urlRow];
    urlNode.innerHTML = '<a href="' + ABC123_HREF + '" download style="color:inherit;text-decoration:none;">' + urlNode.innerHTML + '</a>';

    keyHandler = (e) => {
      if (e.key === "Escape" || e.key === "Backspace") { e.preventDefault(); showRaw(); }
    };
    window.addEventListener("keydown", keyHandler);
  }
